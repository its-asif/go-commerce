services:
  # Web Service for Go Commerce
  - type: web
    name: go-commerce-app
    runtime: docker
    plan: free # Use "free" for the web service (or upgrade as needed)
    envVars:
      - key: PORT
        value: 8000
      - key: JWT_SECRET
        generateValue: true # Render will automatically generate a secure random string
      - key: DB_URL
        fromDatabase:
          name: go-commerce-db
          property: connectionString
      - key: REDIS_URL
        value: "" # Put your external Redis URL here (e.g., from Upstash or Redis Cloud) to stay on the free tier
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: go-commerce-redis
      #     property: connectionString

    # Run database migrations automatically in a temporary container before routing traffic
    preDeployCommand: /app/migrate -path /app/migrations -database $DB_URL up

# Databases
databases:
  - name: go-commerce-db
    plan: free # Render PostgreSQL Free Tier (expires after 90 days)
    postgresMajorVersion: 15

# Uncomment this section if you want to deploy a paid native Redis instance on Render (starts at ~$10/mo)
#   - type: redis
#     name: go-commerce-redis
#     plan: starter
#     ipAllowList: []
